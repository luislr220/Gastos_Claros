<form [formGroup]="registroGasto" (ngSubmit)="handleSubmit()">
  <label for="nombre-gasto">Gasto</label>
  <input
    type="text"
    id="nombre-gasto"
    formControlName="nombre"
    placeholder="Ingresa el nombre del gasto"
  />

  <label for="monto-gasto">Monto</label>
  <input
    type="number"
    id="monto-gasto"
    formControlName="monto"
    placeholder="ingresa el monto de la operación"
  />

  <button>Registrar</button>
</form>
